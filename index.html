    <h1>
      Tennis Match Calculator
    </h1>
<style>
* {
  box-sizing: border-box;
  max-width: 100%;
}

html, body {
  height: 100%;
  margin: 0 auto;
  padding: 0;
  overflow-x: hidden;
  width: 100%;
  background-color: #2d6a4f;  /* deep court green */
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: sans-serif;
  color: #fff;
}

/* --- Button grid --- */
#class {
  width: 100%;
  max-width: 600px;
  display: grid;
  grid-template-columns: 1fr 1fr;
}

button {
  width: 100%;
  height: 15vw;
  min-height: 48px;
  max-height: 100px;
  margin: 0;
  padding: 0;
  font-size: clamp(12px, 3vw, 16px);
  font-weight: bold;
  background-color: #1b4332;   /* dark green */
  color: #fff;
  border: 2px solid #95d5b2;   /* light green border */
  cursor: pointer;
  transition: background 0.2s;
}

button:hover {
  background-color: #40916c;
}

button:active {
  background-color: #95d5b2;
  color: #1b4332;
}

/* --- Score row --- */
#score {
  display: grid;
  grid-template-columns: 1fr 1fr;
  text-align: center;
  padding: 8px;
  gap: 4px;
  width: 100%;
  max-width: 600px;
  background-color: #1b4332;
  border-top: 3px solid #95d5b2;
  border-bottom: 3px solid #95d5b2;
}

#score h2, #score h3 {
  margin: 4px 0;
  font-size: clamp(14px, 4vw, 22px);
  color: #d8f3dc;
}

/* --- Stats section --- */
#total {
  display: grid;
  grid-template-columns: 1fr 1fr;
  width: 100%;
  max-width: 600px;
  border-top: 2px solid #95d5b2;
}

#p1s {
  padding: 8px;
  overflow: hidden;
  background-color: #1a3a6b;    /* P1 = blue */
  border-right: 2px solid #95d5b2;
}

#p2s {
  padding: 8px;
  overflow: hidden;
  background-color: #7a3100;    /* P2 = orange/brown */
}

#total h2 {
  font-size: clamp(11px, 3vw, 16px);
  margin: 8px 0 2px;
  word-break: break-word;
  color: #95d5b2;               /* light green label */
}

#total h3 {
  font-size: clamp(13px, 4vw, 20px);
  margin: 0 0 6px;
  color: #fff;
}

/* P1 stats accent */
#p1s h2 { color: #90c4ff; }
#p1s h3 { color: #fff; }

/* P2 stats accent */
#p2s h2 { color: #ffb347; }
#p2s h3 { color: #fff; }

/* Tiebreak headings */
h1 {
  font-size: clamp(16px, 4vw, 24px);
  color: #d8f3dc;
  text-align: center;
  margin: 8px 0;
}
</style>
